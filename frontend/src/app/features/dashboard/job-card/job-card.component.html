<section class="job-card">
  <div class="job-card-head">
    <div>
      <div class="job-title-row">
        <h2 class="job-title">{{ job().title }}</h2>
        <span class="job-code">#{{ job().code }}</span>
        <span class="badge badge-purple">{{ job().level }}</span>
        <span [class]="matchBadgeClass()">{{ job().matchTag }}</span>
      </div>
    </div>
    <div class="job-actions">
      <button class="btn-outline" type="button" (click)="onOpenCompany()">
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <path d="M9 9h6v6H9z" />
        </svg>
        查看公司详情
      </button>
      <button class="btn-ghost" type="button">
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z" />
        </svg>
        收藏
      </button>
      <button class="btn-ghost" type="button">
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8" />
          <polyline points="16 6 12 2 8 6" />
          <line x1="12" y1="2" x2="12" y2="15" />
        </svg>
        分享
      </button>
    </div>
  </div>

  <div class="job-meta">
    @for (m of job().meta; track $index) {
      <span class="meta-item">
        <svg class="svg-icon ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          @for (p of iconPaths(m.ico); track $index) {
            <path [attr.d]="p" />
          }
        </svg>
        <span [class.salary]="m.isSalary">{{ m.label }}</span>
      </span>
    }
    @if (companyName()) {
      <span class="meta-item">
        <svg class="svg-icon ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
          <path d="M23 21v-2a4 4 0 00-3-3.87" />
        </svg>
        <span>{{ companyName() }}</span>
      </span>
    }
  </div>
</section>
