<main class="main">
  @if (displayJob(); as j) {
    <jb-hero-search [job]="j" />

    <div class="section-bar">
      <div class="section-bar-left">
        <div class="section-bar-icon">◈</div>
        <span class="section-bar-title">职位分析报告</span>
        <span class="section-bar-time">{{ analysisTime() }}</span>
      </div>
      <div class="section-bar-actions">
        <button class="bar-action" type="button">↻ 重新分析</button>
        <button class="bar-action" type="button">↓ 导出</button>
      </div>
    </div>

    <jb-job-card [job]="j" (openCompany)="openCompany(j.company)" />
    <jb-score-overview [job]="j" />
    <jb-analysis-tabs [job]="j" />
  } @else {
    <div class="empty">还没有分析记录，请在上方输入职位链接</div>
  }
</main>
