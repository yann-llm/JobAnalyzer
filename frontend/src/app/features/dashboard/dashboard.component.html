<main class="main">
  @if (displayJob(); as j) {
    <jb-hero-search [job]="j" />

    <div class="section-bar">
      <div class="section-bar-left">
        <div class="section-bar-icon">◈</div>
        <span class="section-bar-title">职位分析报告</span>
        @if (analysisTime()) {
          <span class="section-bar-time">{{ analysisTime() }}</span>
        }
      </div>
      <div class="section-bar-actions">
        <button class="bar-action" type="button" (click)="reanalyze(j)">↻ 重新分析</button>
        <button class="bar-action" type="button" (click)="exportReport(j)">↓ 导出</button>
      </div>
    </div>

    <jb-job-card [job]="j" (openCompany)="openCompany(j.company)" />
    <jb-score-overview
      [job]="j"
      [activeDimension]="activeDimension()"
      (selectDimension)="selectDimensionTab($event)"
    />
    <jb-analysis-tabs
      [job]="j"
      [activeTab]="activeAnalysisTab()"
      (activeTabChange)="activeAnalysisTab.set($event)"
    />
  } @else {
    <section class="empty-start">
      <div class="empty-panel">
        <div class="empty-icon">J</div>
        <h1 class="empty-title">输入职位链接，开始分析</h1>
        <p class="empty-sub">
          粘贴 BOSS 直聘职位地址。将从职责质量、要求合理性、薪酬福利、工作强度、公司评分、行业评分六个维度评估，给出 0–100 综合得分。
        </p>
        <div class="empty-search-row">
          <input
            class="empty-search-input"
            type="url"
            placeholder="https://www.zhipin.com/job_detail/xxx.html"
            [value]="emptyUrlInput()"
            (input)="emptyUrlInput.set($any($event.target).value)"
            (keydown.enter)="submitEmptyUrl()"
          />
          <button
            class="empty-submit"
            type="button"
            [disabled]="emptySubmitting() || !emptyUrlInput().trim()"
            (click)="submitEmptyUrl()"
          >
            {{ emptySubmitting() ? '提交中...' : '开始分析' }}
          </button>
        </div>
        @if (emptySubmitError()) {
          <div class="empty-error">{{ emptySubmitError() }}</div>
        }
      </div>
    </section>
  }
</main>
