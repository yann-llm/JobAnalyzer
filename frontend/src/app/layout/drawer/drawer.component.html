<aside class="drawer">
  <div class="drawer-head">
    <div class="brand">
      <div class="brand-mark">J</div>
      <span>JobScope</span>
    </div>
    <div class="brand-sub">职位分析 · 智能评分</div>
  </div>

  <div class="drawer-tabs" role="tablist" aria-label="职位列表筛选">
    <button
      class="drawer-tab"
      type="button"
      role="tab"
      [class.active]="activeTab() === 'history'"
      [attr.aria-selected]="activeTab() === 'history'"
      (click)="selectTab('history')"
    >
      <span>分析历史</span>
      <span class="count">{{ jobs().length }}</span>
    </button>
    <button
      class="drawer-tab"
      type="button"
      role="tab"
      [class.active]="activeTab() === 'favorites'"
      [attr.aria-selected]="activeTab() === 'favorites'"
      (click)="selectTab('favorites')"
    >
      <span>收藏职位</span>
      <span class="count">{{ favoriteCount() }}</span>
    </button>
  </div>

  <div class="drawer-list">
    @for (job of visibleJobs(); track job.id) {
      <a
        class="job-item"
        [class.active]="job.id === activeId()"
        [routerLink]="['/results', job.id]"
        routerLinkActive="active"
      >
        <div class="job-item-row">
          <div class="job-item-title">{{ job.title }}</div>
          <div class="job-item-score" [class]="scoreClass(job.total).color">{{ job.total }}</div>
        </div>
        <div class="job-item-meta">
          <span>{{ job.miniLabel.split(' · ')[0] }}</span>
          <span class="dot">·</span>
          <span>{{ firstLocation(job) }}</span>
        </div>
      </a>
    }
    @if (!visibleJobs().length) {
      <div class="empty">{{ emptyText() }}</div>
    }
  </div>

  <a class="drawer-foot" routerLink="/profile" routerLinkActive="active">
    <span class="dot"></span>
    <span>候选人画像 · 已配置</span>
  </a>
</aside>
